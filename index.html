<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AI面试助手</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI","PingFang SC","Helvetica Neue","Arial",sans-serif;
      background: #f6fafc;
      color: #222;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .page {
      width: min(100%, 1000px);
      display: flex;
      flex-direction: column;
      margin: 30px 12px 20px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      overflow: hidden;
      min-height: 80vh;
      max-height: 92vh;
    }
    .header {
      padding: 16px 20px;
      border-bottom: 1px solid #e8eff3;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fbfeff;
    }
    .header h1 {
      margin: 0;
      font-size: 1.3rem;
      color: #0c4a73;
      font-weight: 600;
    }
    .header .tag {
      border: 1px solid #c4def6;
      color: #1569ab;
      background: #ebf6ff;
      border-radius: 999px;
      padding: 2px 10px;
      font-size: 0.75rem;
    }
    .chat-area {
      flex: 1;
      overflow-y: auto;
      background: linear-gradient(180deg,#f7fcff 0%,#f0f8fd 100%);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-thumb { background: #d0e4ef; border-radius: 4px; }
    
    .message {display: flex; gap: 8px; width: fit-content; max-width: 85%; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.ai { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .bubble {
      display: inline-block;
      padding: 11px 13px;
      border-radius: 14px;
      font-size: 0.96rem;
      color: #1e2a31;
      word-break: break-word;
      white-space: pre-wrap;
      line-height: 1.6;
      box-shadow: 0 3px 6px rgba(19,36,50,.09);
    }
    .bubble.ai {
      background: #f1f7fb;
      border: 1px solid #dcebf5;
    }
    .bubble.user {
      background: #d6eff5;
      border: 1px solid #c6e6ef;
    }
    .bubble .small {
      font-size: .78rem; color:#5a7185;
      margin-top:4px;display:block;
    }
    .quick-prompts {
      display: flex; gap: 8px; overflow-x: auto; padding: 12px 16px 10px; background: #f9feff;
      scrollbar-width: none; flex-shrink: 0; border-top: 1px solid #e6edf1;
    }
    .quick-prompts::-webkit-scrollbar { display: none; }
    .prompt-chip {
      white-space: nowrap; font-size: 0.85rem; color: #1569ab; background: #e8eff3;
      padding: 6px 12px; border-radius: 16px; cursor: pointer; transition: 0.2s;
      border: 1px solid transparent; flex-shrink: 0;
    }
    .prompt-chip:hover { background: #d0e4ef; border-color: #b0d0e3; transform: translateY(-1px); }

    .input-wrapper {
      padding: 6px 16px 16px;
      background: #f9feff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .input-actions-bar {
      display: flex;
      gap: 12px;
      padding: 0 4px;
    }
    .input-actions-bar button {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 50%;
      transition: all 0.2s;
    }
    .input-actions-bar button:hover {
      background: #e8eff3;
      color: #1569ab;
    }
    .input-container-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .textarea-wrapper {
      flex: 1;
      position: relative;
      display: flex;
    }
    .textarea-wrapper textarea {
      flex: 1;
      width: 100%;
      max-height: 120px;
      min-height: 48px;
      resize: none;
      border-radius: 12px;
      border: 1px solid #cae2eb;
      padding: 12px 40px 12px 14px; /* extra right padding for STT button */
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.04);
      transition: all 0.2s;
    }
    .textarea-wrapper textarea:focus { outline: none; border-color: #82b9d5; box-shadow: 0 0 0 3px rgba(130,185,213,0.15); }
    .stt-in-input {
      position: absolute;
      right: 8px;
      bottom: 8px;
      background: transparent;
      border: none;
      color: #729eb3;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px;
      border-radius: 50%;
      transition: all 0.2s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    .stt-in-input:hover, .stt-in-input:focus, .stt-in-input:active {
      background: transparent;
      color: #1569ab;
      outline: none;
    }
    
    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
      padding: 0 10px 2px;
    }
    .controls label { font-size: 0.8rem; color: #2f4f5f; }
    .controls input[type=range] { width: 90px; }
    #sendBtn, .bottom-btn {
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg,#1c7dbf,#1569ab);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      padding: 10px 18px;
      transition: all .15s ease;
      box-shadow: 0 4px 10px rgba(21,105,171,.2);
      font-size: 0.95rem;
    }
    #sendBtn:hover, .bottom-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(21,105,171,.3);
    }
    .bottom-btn { background: #fff; border: 1px solid #cae2eb; color: #5a7185; box-shadow: none; font-weight: normal; padding: 6px 12px; font-size: 0.85rem;}
    .bottom-btn:hover { background: #f0f6fa; border-color: #a5cddf; color: #1569ab; box-shadow: none; }
      .bottom-row { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; grid-column: 1 / -1; }
    .status {
      font-size: 0.82rem;
      color: #4f7c93;
      padding: 0 8px;
    }
    .small-footer {
      font-size: 0.78rem;
      color: #5f7f8f;
      text-align: center;
      margin: 6px 0 8px;
    }
    .hidden { display: none; }
    .voice-overlay {
      position: fixed; top:0; left:0; width:100vw; height:100vh;
      background: rgba(246, 250, 252, 0.95);
      backdrop-filter: blur(10px);
      z-index: 999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.3s;
    }
    .voice-overlay.hidden { display: none; opacity: 0; pointer-events: none; }
    .voice-avatar {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: #ffffff;
      display: flex; justify-content: center; align-items: center;
      color: #176488; font-size: 2.5rem; font-weight: bold;
      border: 2px solid #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 30px;
      overflow: hidden;
      padding: 0;
    }
    .voice-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      border-radius: 50%;
      transform: scale(1.4); /* 放大内部狗狗图像，屏蔽掉多余的白色/透明背景 */
    }
    .pulse-anim { animation: pulse 2s infinite; }
    .pulse-fast { animation: pulse 1s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 4px 15px rgba(0,0,0,0.1), 0 0 0 0 rgba(0,0,0,0.05); }
      70% { box-shadow: 0 4px 15px rgba(0,0,0,0.1), 0 0 0 40px rgba(0,0,0,0); }
      100% { box-shadow: 0 4px 15px rgba(0,0,0,0.1), 0 0 0 0 rgba(0,0,0,0); }
    }
    .voice-status { font-size: 1.2rem; color: #165e86; margin-bottom: 50px; font-weight: 500; }
    .voice-rate-control {
      margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 8px;
      color: #5a7185; font-size: 0.9rem;
    }
    .voice-rate-control input[type=range] { width: 120px; accent-color: #1569ab; }
    .end-call-btn {
      background: #ff4d4f; color: #fff; border: none;
      padding: 12px 30px; border-radius: 30px; font-size: 1.1rem;
      cursor: pointer; box-shadow: 0 6px 16px rgba(255,77,79,.3);
      transition: all 0.2s;
    }
    .end-call-btn:hover { background: #cf1322; transform: translateY(-2px); }
    @media(max-width:600px){
      body { background: #fff; padding: 0; margin: 0; }
      .user-tag { max-width: 60px; padding: 4px 8px; }
      .logout-btn { padding: 4px 8px; font-size: 0.8rem; }
      .page { 
        margin: 0; 
        width: 100%; 
        border-radius: 0; 
        min-height: 100dvh; 
        max-height: 100dvh; 
        box-shadow: none;
      }
      .header { padding: 10px 12px; gap: 6px; }
      .header h1 { font-size: 1.05rem; white-space: nowrap; }
      .header h1 svg { width: 20px; height: 20px; }
      .header .tag { padding: 2px 6px; font-size: 0.7rem; white-space: nowrap; }
      .menu-btn { margin-right: 0; width: 32px; height: 32px; }
      .header-right { gap: 2px; }
      .icon-btn { width: 32px; height: 32px; }
      .chat-round { width: 60px; height: 60px; }
      .input-wrapper { grid-template-columns: 1fr auto; padding: 10px 12px; gap: 8px; }
      .input-wrapper button { font-size: 0.95rem; padding: 10px 16px; }
      .quick-prompts { padding: 10px 12px 8px; }
      .login-box, .register-box { width: 90%; max-width: 320px; padding: 25px 20px; }
      .sidebar { width: 80%; left: -100%; max-width: 280px; }
      .new-chat-btn { font-size: 1.1rem; padding: 12px; }
      .session-item { font-size: 1.05rem; padding: 14px 32px 14px 14px; }
    }
    .login-overlay {
      position: fixed; inset: 0; background: rgba(246, 250, 252, 0.9);
      backdrop-filter: blur(5px);
      z-index: 1000; display: flex; align-items: center; justify-content: center;
      transition: opacity 0.3s;
    }
    .login-overlay.hidden { display: none; opacity: 0; pointer-events: none; }
    .login-box {
      background: #fff; width: 340px; padding: 35px 30px; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,.1); text-align: center;
    }
    .login-box h2 { color: #0c4a73; margin: 0 0 24px; font-size: 1.5rem; letter-spacing: 1px; }
    .login-box input {
      width: 100%; padding: 12px 14px; margin-bottom: 16px; border-radius: 10px;
      border: 1px solid #cae2eb; font-size: 1rem; outline: none; background: #fafcff;
    }
    .login-box input:focus { border-color: #82b9d5; background: #fff; box-shadow: 0 0 0 3px rgba(130,185,213,0.15); }
    .login-box button {
      width: 100%; padding: 12px; border-radius: 10px; font-size: 1.05rem; font-weight: bold;
      cursor: pointer; border: none; transition: 0.2s; margin-bottom: 12px;
    }
    .btn-login { background: #1569ab; color: #fff; box-shadow: 0 4px 12px rgba(21,105,171,.2); }
    .btn-login:hover { background: #11578f; transform: translateY(-1px); }
    .btn-reg { background: #e8eff3; color: #1569ab; }
    .btn-reg:hover { background: #dce7ee; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .icon-btn {
      background: transparent; border: none; color: #5a7185; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%; transition: all 0.2s;
    }
    .icon-btn:hover { background: #e8eff3; color: #1569ab; }
    .icon-btn svg { width: 20px; height: 20px; }
    .user-tag { 
      font-size: 0.9rem; color: #1569ab; font-weight: 600; background: #ebf6ff; padding: 4px 12px; border-radius: 20px; margin-left: 4px;
      max-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: middle;
    }
    .logout-btn { 
      background: transparent; color: #d32f2f; border: 1px solid #ffccc7; 
      padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.2s;
    }
    .logout-btn:hover { background: #fff1f0; border-color: #ffa39e; }
    .sidebar {
      position: fixed; top: 0; left: -260px; width: 260px; height: 100vh;
      background: #f9feff; box-shadow: 2px 0 12px rgba(0,0,0,0.1);
      z-index: 1050; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column;
    }
    .sidebar.open { left: 0; }
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 1040;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
    .sidebar-header { padding: 20px 16px; border-bottom: 1px solid #e6edf1; }
    .new-chat-btn {
      width: 100%; padding: 12px; background: #1569ab; border: none; font-size: 1.05rem;
      border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s; box-shadow: 0 4px 10px rgba(21,105,171,.2);
    }
    .new-chat-btn:hover { background: #11578f; transform: translateY(-1px); }
    .session-list { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .session-item {
      padding: 12px 32px 12px 12px; border-radius: 8px; cursor: pointer; font-size: 0.95rem;
      color: #2f4f5f; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
      border: 1px solid transparent; transition: all 0.2s; position: relative; font-weight: 500;
    }
    .session-item:hover { background: #edf7fc; }
    .session-item.active { background: #d6eff5; border-color: #c6e6ef; color: #176488; }
    .delete-session {
      position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      color: #ff4d4f; background: none; border: none; cursor: pointer;
      display: none; padding: 4px; border-radius: 4px; font-size: 1.2rem; line-height: 1;
    }
    .delete-session:hover { background: #fff1f0; }
    .session-item:hover .delete-session { display: block; }
    .menu-btn {
      cursor: pointer; background: transparent; border: none; color: #1569ab; display: flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%; padding: 0; transition: 0.2s; margin-right: 4px;
    }
    .menu-btn:hover { background: #e8eff3; }
      .avatar-grid { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .avatar-opt { width: 75px; height: 75px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; user-select: none; overflow: hidden; padding: 0; margin: 0; }
    .avatar-opt img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; border-radius: 50%; transform: scale(1.4); }
    .avatar-opt.selected { border-color: #1569ab; transform: scale(1.15); box-shadow: 0 4px 10px rgba(21,105,171,.3); }
    .user-avatar-disp { font-size: 1.2rem; margin-right: 4px; vertical-align: middle; }
  </style>
</head>
<body>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        新建对话
      </button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <div id="loginOverlay" class="login-overlay hidden">
    <!-- 登录面板 -->
    <div class="login-box" id="loginBox">
      <h2>登录 面试助手</h2>
      <input type="text" id="loginUsername" placeholder="请输入用户名" />
      <input type="password" id="loginPassword" placeholder="请输入密码" />
      <button class="btn-login" id="loginBtn">登 录</button>
      <button class="btn-reg" id="gotoRegisterBtn">没 有 账 号 ？ 去 注 册</button>
    </div>
    <!-- 注册面板 -->
    <div class="login-box hidden" id="registerBox">
      <h2>注册 新账号</h2>
      <div class="avatar-grid" id="regAvatarGrid">
        <div class="avatar-opt selected" data-avatar="avatars/21A35E72DE6FBE82A71682285B121BDC.png"><img src="avatars/21A35E72DE6FBE82A71682285B121BDC.png" alt="dog1"></div>
        <div class="avatar-opt" data-avatar="avatars/3E16E282FEDF6A40633FA8B8FFE6F0DF.png"><img src="avatars/3E16E282FEDF6A40633FA8B8FFE6F0DF.png" alt="dog2"></div>
        <div class="avatar-opt" data-avatar="avatars/64CF685321AB2EE1FDAD019DC0E78DEA.png"><img src="avatars/64CF685321AB2EE1FDAD019DC0E78DEA.png" alt="dog3"></div>
        <div class="avatar-opt" data-avatar="avatars/6E8B9214F6D1C887397008D6C43D9305.png"><img src="avatars/6E8B9214F6D1C887397008D6C43D9305.png" alt="dog4"></div>
        <div class="avatar-opt" data-avatar="avatars/D827DFB784CEAE35790B79BEBBE5F17D.png"><img src="avatars/D827DFB784CEAE35790B79BEBBE5F17D.png" alt="dog5"></div>
      </div>
      <input type="text" id="regUsername" placeholder="设置新用户名" />
      <input type="password" id="regPassword" placeholder="设置密码 (最少4位)" />
      <button class="btn-login" id="registerBtn">确 认 注 册</button>
      <button class="btn-reg" id="gotoLoginBtn">已 有 账 号 ？ 去 登 录</button>
    </div>
  </div>
  <div id="voiceOverlay" class="voice-overlay hidden">
    <div class="voice-avatar pulse-anim" id="voiceAvatar">AI</div>
    <div class="voice-status" id="voiceStatus">正在连接...</div>
    <button class="end-call-btn" id="endCallBtn">结束通话</button>
    <div class="voice-rate-control">
      <label>语速调整: <span id="rateVal">1.0</span>x</label>
      <input id="speechRate" type="range" min="0.7" max="2.0" step="0.1" value="1.0">
    </div>
  </div>
  <main class="page">
    <header class="header">
      <button id="menuBtn" class="menu-btn" title="查看历史对话">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
      </button>
      <h1>
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: text-bottom; margin-right: 4px; color: #1569ab;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        AI面试助手
      </h1>
      <span class="tag">AI 面试模拟</span>
      <div class="header-right">
        <span class="user-tag" id="userDisplay"></span>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
      </div>
    </header>
    <section id="chatArea" class="chat-area">
      <div class="small-footer">欢迎使用，输入你的面试方向或具体问题，AI会自动识别场景。回车发送。</div>
    </section>
    <div class="quick-prompts" id="quickPromptsWrapper">
      <span class="prompt-chip">🏦 银行面试模拟</span>
      <span class="prompt-chip">🗣️ 英语口语测试</span>
      <span class="prompt-chip">👨‍🏫 教资结构化</span>
      <span class="prompt-chip">🏢 国企面试</span>
      <span class="prompt-chip">🎓 考研复试面试</span>
    </div>
    <section class="input-wrapper">
      <div class="file-preview-area" id="filePreviewArea" style="display:none; padding: 4px; border: 1px solid #cae2eb; border-radius: 8px; margin-bottom: 8px; background: #fff; align-items: center; gap: 8px;">
        <span id="fileNameDisplay" style="font-size: 0.85rem; color: #1569ab; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
        <button id="clearFileBtn" style="background:none; border:none; color:#d32f2f; cursor:pointer;">&times;</button>
      </div>
      <div class="input-actions-bar">
        <label for="fileUpload" class="icon-btn" title="上传文件/照片 (图片或txt/md)" style="width: auto; height: auto; margin:0;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </label>
        <input type="file" id="fileUpload" style="display: none" accept="image/*,text/plain,.txt,.md,.xml,.csv,.json">
        <button class="icon-btn" id="muteBtn" title="静音 (关闭语音播报)" style="width: auto; height: auto;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
        </button>
        <button class="icon-btn" id="micBtn" title="开启语音通话" style="width: auto; height: auto;">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        </button>
      </div>
      <div class="input-container-row">
        <div class="textarea-wrapper">
          <textarea id="userInput" placeholder="说点什么... 回车发送"></textarea>
          <button class="stt-in-input" id="sttBtn" title="语音输入">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </button>
        </div>
        <button id="sendBtn">发送</button>
      </div>
      <div class="bottom-row">
        <span class="status" id="statusLabel">空闲</span>
      </div>
    </section>
  </main>

  <script>
    const chatArea = document.getElementById("chatArea");
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const sttBtn = document.getElementById("sttBtn");
    const fileUpload = document.getElementById("fileUpload");
    const filePreviewArea = document.getElementById("filePreviewArea");
    const fileNameDisplay = document.getElementById("fileNameDisplay");
    const clearFileBtn = document.getElementById("clearFileBtn");
    const statusLabel = document.getElementById("statusLabel");
    const speechRate = document.getElementById("speechRate");
    const rateVal = document.getElementById("rateVal");
    const muteBtn = document.getElementById("muteBtn");
    const micBtn = document.getElementById("micBtn");
    const voiceOverlay = document.getElementById("voiceOverlay");
    const voiceStatus = document.getElementById("voiceStatus");
    const voiceAvatar = document.getElementById("voiceAvatar");
    const endCallBtn = document.getElementById("endCallBtn");

    let sttActive = false;
    let sttRecognition;
    if('webkitSpeechRecognition' in window) {
      sttRecognition = new webkitSpeechRecognition();
      sttRecognition.continuous = false;
      sttRecognition.interimResults = false;
      sttRecognition.lang = 'zh-CN';
      
      sttRecognition.onstart = () => {
        sttActive = true;
        sttBtn.style.color = '#ef5350';
        input.placeholder = '正在聆听... (请说话)';
      };
      
      sttRecognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        input.value += transcript;
      };
      
      sttRecognition.onerror = (event) => {
        console.error('STT error', event.error);
        statusLabel.textContent = "语音识别错误: " + event.error;
      };
      
      sttRecognition.onend = () => {
        sttActive = false;
        sttBtn.style.color = '#555';
        input.placeholder = '说点什么... 回车发送';
      };
      
      sttBtn.addEventListener('click', () => {
        if(sttActive) {
          sttRecognition.stop();
        } else {
          sttRecognition.start();
        }
      });
    } else {
      sttBtn.style.display = 'none'; // Platform not supported
    }

    let recognition;
    let isLoading = false;
    let isVoiceMode = false;
    let isSoundOn = true;

    // File Upload State
    let pendingFileBlob = null;
    let pendingFileType = null; // 'text' | 'image'
    
    fileUpload.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const isImg = file.type.startsWith("image/");
      pendingFileType = isImg ? "image" : "text";
      const reader = new FileReader();
      reader.onload = (evt) => {
        pendingFileBlob = evt.target.result;
        fileNameDisplay.textContent = isImg ? "已选图片: " + file.name : "已选文档: " + file.name;
        filePreviewArea.style.display = "flex";
      };
      if (isImg) {
        reader.readAsDataURL(file);
      } else {
        reader.readAsText(file);
      }
      fileUpload.value = "";
    });

    clearFileBtn.addEventListener("click", () => {
      pendingFileBlob = null;
      pendingFileType = null;
      filePreviewArea.style.display = "none";
    });

    muteBtn.onclick = () => {
      isSoundOn = !isSoundOn;
      if (isSoundOn) {
        muteBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
        muteBtn.title = "静音 (关闭语音播报)";
      } else {
        muteBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="1" x2="1" y2="23"></line></svg>`;
        muteBtn.title = "开启语音播报";
        if(window.speechSynthesis) window.speechSynthesis.cancel();
      }
    };

    function setVoiceStatus(text) { voiceStatus.textContent = text; }

    const domainKeywords = [
      {keys: ["银行","信用卡","理财","金融"], lang:"zh", note:"银行/金融面试"},
      {keys: ["考公","公务员","事业单位"], lang:"zh", note:"公考面试"},
      {keys: ["考研","研究生"], lang:"zh", note:"考研面试"},
      {keys: ["教资","教师资格","讲师"], lang:"zh", note:"教资面试"},
      {keys: ["国企","国有企业"], lang:"zh", note:"国企面试"},
      {keys: ["求职","简历","岗位","面试"], lang:"zh", note:"求职面试"},
      {keys: ["英语口语","English","英语"], lang:"en", note:"英语口语练习"},
    ];

    function appendMessageToUI(text, who="ai") {
      const wrapper = document.createElement("div");
      wrapper.className = "message " + who;
      const bubble = document.createElement("div");
      bubble.className = "bubble " + who;
      
      let htmlContent = text.replace(/\n/g, '<br/>');
      htmlContent = htmlContent.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      bubble.innerHTML = htmlContent;
      
      wrapper.appendChild(bubble);
      chatArea.appendChild(wrapper);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function appendMessage(text, who="ai", saveHistory=true) {
      appendMessageToUI(text, who);

      if (saveHistory && currentUsername && text !== "正在生成回答…") {
        const session = sessions.find(s => s.id == activeSessionId);
        if(session) {
          session.messages.push({role: who, content: text});
          // 如果是用户的第一条消息，自动将标题变更为该消息前15字
          if(session.messages.length === 1 && who === 'user') {
            session.title = text.length > 15 ? text.substring(0, 15) + "..." : text;
            renderSidebar();
          }
          saveSessions();
        }
      }
    }

    function setStatus(text){
      statusLabel.textContent = text;
    }

    function detectScenario(content){
      const lower = content.toLowerCase();
      for (const item of domainKeywords){
        for (const kw of item.keys){
          if (lower.includes(kw.toLowerCase())){
            return item;
          }
        }
      }
      return {lang:"zh", note:"通用面试"};
    }

    function getAIMessagePrompt(msg){
      const sceneInfo = detectScenario(msg);
      const isEnglish = sceneInfo.lang === "en";
      if(isEnglish){
        return `\n你是面试助理，请用英文回答，并给出英语口语建议。\n用户问题：${msg}\n要求：1) 回答自然流畅，可用于口语模拟。2) 简明。3) 可给出对话练习问题。\n`;
      } else {
        return `\n你是面试助理，请用中文回答并结合场景提供有针对性的建议。\n场景：${sceneInfo.note}\n用户问题：${msg}\n要求：1) 回答清晰，适合面试模拟。2) 有扩展提问（示例问题）。3) 各场景要求中文。\n`;
      }
    }

    async function queryChatGpt(question){
      setStatus("AI 正在思考...");
      
      let finalPrompt = getAIMessagePrompt(question);
      let isMultimodal = false;

      // 如果有挂载文本，合并到 Prompt 中
      if (pendingFileType === "text" && pendingFileBlob) {
        finalPrompt = "【用户上传了背景参考资料】\n" + pendingFileBlob.substring(0, 3000) + "\n\n【用户问题】\n" + finalPrompt;
      } else if (pendingFileType === "image" && pendingFileBlob) {
        isMultimodal = true;
      }

      const API_KEY = "sk-e2ac4dc6fedf4385a0f5aaf61ed4657f";
      const API_HOST = "https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions";
      const headers = {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + API_KEY
      };
      
      let userMessageContent = finalPrompt;
      if (isMultimodal) {
        userMessageContent = [
          { type: "text", text: finalPrompt },
          { type: "image_url", image_url: { url: pendingFileBlob } }
        ];
      }

      const body = {
        model: isMultimodal ? "qwen-vl-plus" : "qwen-plus", // Changed to qwen-plus for Qwen 3.5 Plus capabilities under DashScope
        temperature: 0.8,
        top_p: 0.95,
        messages: [
          {role:"system", content:"你是一个友好、专业的AI面试助手，可以根据用户资料/图片进行针对性提问。"},
          {role:"user", content: userMessageContent }
        ]
      };

      try {
        const resp = await fetch(API_HOST, {
          method: "POST",
          headers,
          body: JSON.stringify(body)
        });
        if (!resp.ok) {
          const errText = await resp.text();
          throw new Error(`HTTP ${resp.status} ${resp.statusText} // ${errText}`);
        }
        const data = await resp.json();
        let content = "";
        if (data?.choices && data.choices[0]?.message?.content) {
          content = data.choices[0].message.content.trim();
        } else if (data?.data?.[0]?.content) {
          content = data.data[0].content.trim();
        } else if (data?.result?.[0]?.content) {
          content = data.result[0].content.trim();
        }
        if (!content) content = "[AI 未返回内容，请检查 API 设置]";
        return content;
      } catch (e) {
        console.error(e);
        return "出错了：" + e.message;
      } finally {
        setStatus("空闲");
      }
    }

    function speakText(text, voiceLang="zh-CN"){
      if(!isSoundOn || !window.speechSynthesis) {
        if(isVoiceMode) setTimeout(()=>{ startRec(); }, 500);
        return;
      }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = Number(speechRate.value) || 1;
      u.lang = voiceLang;
      u.onstart = () => {
        if(isVoiceMode) {
          setVoiceStatus("AI 说话中...");
          voiceAvatar.className = "voice-avatar pulse-fast";
        }
      };
      u.onend = () => { if(isVoiceMode) setTimeout(()=>{ startRec(); }, 300); };
      u.onerror = () => { if(isVoiceMode) setTimeout(()=>{ startRec(); }, 300); };
      window.speechSynthesis.speak(u);
    }

    function startRec() {
      if(!recognition || isLoading || window.speechSynthesis.speaking || !isVoiceMode) return;
      try { 
        recognition.start(); 
        setVoiceStatus("🎙️ 正在聆听，请说话..."); 
        voiceAvatar.className = "voice-avatar pulse-anim";
      } catch(e){}
    }

    async function doSend(evtOrOverrideText){
      if(isLoading) return;
      const text = typeof evtOrOverrideText === 'string' ? evtOrOverrideText.trim() : input.value.trim();
      if(!text && !pendingFileBlob) return;
      
      let displayText = text;
      if (pendingFileBlob) {
         displayText = `[已附加${pendingFileType==="image"?"图片":"文件"}] ` + text;
      }
      appendMessage(displayText,"user");
      
      if(typeof evtOrOverrideText !== 'string') input.value = "";
      const scenario = detectScenario(text);
      const aiLang = scenario.lang === "en" ? "en-US" : "zh-CN";
      isLoading = true;
      setStatus("加载中...");
      if(isVoiceMode) {
        setVoiceStatus("AI 思考中...");
        voiceAvatar.className = "voice-avatar";
      }
      appendMessage("正在生成回答…","ai");
      try{
        const aiReply = await queryChatGpt(text);
        const lastMsg = Array.from(chatArea.querySelectorAll(".message.ai")).pop();
        if(lastMsg && lastMsg.textContent.includes("正在生成回答")) {
          lastMsg.remove();
        }
        appendMessage(aiReply,"ai");
        speakText(aiReply, aiLang);

        if (pendingFileBlob) {
          pendingFileBlob = null;
          pendingFileType = null;
          filePreviewArea.style.display = "none";
        }
      } catch(e) {
        appendMessage("调用失败：" + e.message,"ai");
      }
      isLoading = false;
      setStatus("空闲");
    }

    sendBtn.addEventListener("click", doSend);
    input.addEventListener("keydown", (e)=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); doSend(); }});

    // 快捷提示点击事件
    document.querySelectorAll(".prompt-chip").forEach(chip => {
      chip.addEventListener("click", () => {
        input.value = chip.textContent.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '').trim();
        doSend();
      });
    });
    speechRate.addEventListener("input", ()=> { rateVal.textContent = speechRate.value; });

    if ("SpeechRecognition" in window || "webkitSpeechRecognition" in window) {
      const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRec();
      recognition.lang = "zh-CN";
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      recognition.continuous = false;
      recognition.onresult = (event) => {
        const transcript = Array.from(event.results).map(r=>r[0].transcript).join('');
        if(isVoiceMode) {
          doSend(transcript);
        } else {
          input.value = transcript;
          doSend();
        }
      };
      recognition.onerror = (event) => {
        if(event.error !== "no-speech" && event.error !== "aborted"){
           setStatus("语音识别失败：" + event.error);
           if(isVoiceMode) setVoiceStatus("识别失败，请重试");
        }
      };
      recognition.onend = ()=>{
        if (isVoiceMode && !isLoading && !window.speechSynthesis.speaking) {
           setTimeout(startRec, 500); 
        } else if (!isVoiceMode && !isLoading) {
           setStatus("空闲");
        }
      };
      micBtn.addEventListener("click", () => {
        isVoiceMode = true;
        voiceOverlay.classList.remove("hidden");
        let userAvatars = JSON.parse(localStorage.getItem('ai_users_avatar') || '{}');
        let avatar = userAvatars[currentUsername] || "avatars/21A35E72DE6FBE82A71682285B121BDC.png";
        voiceAvatar.innerHTML = '<img src="' + avatar + '" alt="avatar">';
        startRec();
      });
      endCallBtn.addEventListener("click", () => {
        isVoiceMode = false;
        voiceOverlay.classList.add("hidden");
        recognition.stop();
        if(window.speechSynthesis) window.speechSynthesis.cancel();
        setStatus("已退出语音通话，记录已保存");
      });
    } else {
      micBtn.disabled = true;
      micBtn.title = "浏览器不支持语音识别";
    }

    window.addEventListener("beforeunload", ()=>{ if(window.speechSynthesis) window.speechSynthesis.cancel();});

    // ========== 登录注册与多会话历史记忆逻辑 ==========
    const loginOverlay = document.getElementById("loginOverlay");
    const loginBox = document.getElementById("loginBox");
    const registerBox = document.getElementById("registerBox");
    const gotoRegisterBtn = document.getElementById("gotoRegisterBtn");
    const gotoLoginBtn = document.getElementById("gotoLoginBtn");

    const loginUsername = document.getElementById("loginUsername");
    const loginPassword = document.getElementById("loginPassword");
    const regUsername = document.getElementById("regUsername");
    const regPassword = document.getElementById("regPassword");
    const loginBtnUI = document.getElementById("loginBtn");
    const registerBtnUI = document.getElementById("registerBtn");
    const userDisplay = document.getElementById("userDisplay");
    
    let selectedAvatar = "avatars/21A35E72DE6FBE82A71682285B121BDC.png";
    document.querySelectorAll("#regAvatarGrid .avatar-opt").forEach(opt => {
      opt.addEventListener("click", () => {
        document.querySelectorAll("#regAvatarGrid .avatar-opt").forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
        selectedAvatar = opt.getAttribute("data-avatar");
      });
    });

    const logoutBtn = document.getElementById("logoutBtn");
    
    // Sidebar elements
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebarOverlay");
    const menuBtn = document.getElementById("menuBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const sessionList = document.getElementById("sessionList");

    let currentUsername = localStorage.getItem('ai_current_user') || "";
    let sessions = [];
    let activeSessionId = null;

    menuBtn.onclick = () => { sidebar.classList.add("open"); sidebarOverlay.classList.add("open"); };
    sidebarOverlay.onclick = () => { sidebar.classList.remove("open"); sidebarOverlay.classList.remove("open"); };

    function initSessions() {
      if(!currentUsername) return;
      sessions = JSON.parse(localStorage.getItem('ai_sessions_' + currentUsername) || '[]');
      
      // 旧数据迁移
      let oldHistory = JSON.parse(localStorage.getItem('ai_chat_history_' + currentUsername));
      if(oldHistory && oldHistory.length > 0) {
         sessions.push({id: Date.now(), title: "历史对话", messages: oldHistory});
         localStorage.removeItem('ai_chat_history_' + currentUsername);
      }

      if(sessions.length === 0) {
         createNewSession(false);
      } else {
         activeSessionId = localStorage.getItem('ai_active_session_' + currentUsername) || sessions[0].id;
         if(!sessions.find(s=>s.id == activeSessionId)) activeSessionId = sessions[0].id;
         saveSessions(); // 触发侧边栏渲染
         loadActiveSession();
      }
    }

    function saveSessions() {
       if(!currentUsername) return;
       localStorage.setItem('ai_sessions_' + currentUsername, JSON.stringify(sessions));
       localStorage.setItem('ai_active_session_' + currentUsername, activeSessionId);
       renderSidebar();
    }

    function createNewSession(autoClose = true) {
       const newSession = { id: Date.now(), title: "新对话", messages: [] };
       sessions.unshift(newSession);
       activeSessionId = newSession.id;
       saveSessions();
       loadActiveSession();
       if(autoClose && sidebarOverlay.classList.contains("open")) sidebarOverlay.onclick();
    }
    
    newChatBtn.onclick = () => createNewSession();

    function renderSidebar() {
      sessionList.innerHTML = "";
      sessions.forEach(s => {
        const div = document.createElement("div");
        div.className = "session-item" + (s.id == activeSessionId ? " active" : "");
        div.textContent = s.title;
        div.onclick = () => {
          activeSessionId = s.id;
          saveSessions();
          loadActiveSession();
          sidebarOverlay.onclick();
        };
        const delBtn = document.createElement("button");
        delBtn.className = "delete-session";
        delBtn.innerHTML = "×";
        delBtn.title = "删除对话";
        delBtn.onclick = (e) => {
          e.stopPropagation();
          sessions = sessions.filter(x => x.id !== s.id);
          if(sessions.length === 0) createNewSession(false);
          else if(activeSessionId == s.id) {
            activeSessionId = sessions[0].id;
            loadActiveSession();
          }
          saveSessions();
        };
        div.appendChild(delBtn);
        sessionList.appendChild(div);
      });
    }

    function loadActiveSession() {
       chatArea.innerHTML = '<div class="small-footer">欢迎使用，输入你的面试方向或具体问题，AI会自动识别场景。回车发送。</div>';
       const session = sessions.find(s => s.id == activeSessionId);
       if(session && session.messages) {
         session.messages.forEach(m => appendMessageToUI(m.content, m.role));
       }
    }

    function checkLoginState() {
      if (currentUsername) {
        loginOverlay.classList.add("hidden");
        let userAvatars = JSON.parse(localStorage.getItem('ai_users_avatar') || '{}');
        let avatar = userAvatars[currentUsername] || "avatars/21A35E72DE6FBE82A71682285B121BDC.png";
        userDisplay.innerHTML = `<img src="` + avatar + `" class="user-avatar-disp" style="width:24px;height:24px;border-radius:50%;object-fit:cover;transform:scale(1.4);">` + currentUsername;
        initSessions();
      } else {
        loginOverlay.classList.remove("hidden");
        userDisplay.textContent = "";
        sessions = [];
        sessionList.innerHTML = "";
        chatArea.innerHTML = '<div class="small-footer">请先登录开始对话。</div>';
      }
    }

    gotoRegisterBtn.onclick = () => {
      loginBox.classList.add("hidden");
      registerBox.classList.remove("hidden");
    };

    gotoLoginBtn.onclick = () => {
      registerBox.classList.add("hidden");
      loginBox.classList.remove("hidden");
    };

    loginBtnUI.onclick = () => {
      const u = loginUsername.value.trim();
      const p = loginPassword.value.trim();
      if(!u || !p) return alert("请输入用户名和密码！");
      const users = JSON.parse(localStorage.getItem('ai_users_db') || '{}');
      if(users[u] === p) {
        currentUsername = u;
        localStorage.setItem('ai_current_user', u);
        loginUsername.value = ""; loginPassword.value = "";
        checkLoginState();
      } else {
        alert("用户名或密码错误，请重试！");
      }
    };

    registerBtnUI.onclick = () => {
      const u = regUsername.value.trim();
      const p = regPassword.value.trim();
      if(!u || p.length < 4) return alert("请输入用户名和至少4位密码！");
      const users = JSON.parse(localStorage.getItem('ai_users_db') || '{}');
      if(users[u]) return alert("该用户名已被注册，请直接登录！");
      
      // 注册逻辑
      users[u] = p;
      localStorage.setItem('ai_users_db', JSON.stringify(users));

      let userAvatars = JSON.parse(localStorage.getItem('ai_users_avatar') || '{}');
      userAvatars[u] = selectedAvatar;
      localStorage.setItem('ai_users_avatar', JSON.stringify(userAvatars));

      alert("注册成功！马上为您自动登录。");
      
      currentUsername = u;
      localStorage.setItem('ai_current_user', u);
      regUsername.value = ""; regPassword.value = "";
      // 自动切回登录面板，以免下次退出登录时显示注册
      registerBox.classList.add("hidden");
      loginBox.classList.remove("hidden");
      
      checkLoginState();
    };

    logoutBtn.onclick = () => {
      currentUsername = "";
      localStorage.removeItem('ai_current_user');
      checkLoginState();
    };

    // 初始化页面时检查状态
    checkLoginState();

  </script>
</body>
</html>
